<template>
  <lightning-card title={title} icon-name="standard:record_delete">
    <div class="slds-p-around_small">
      <div class="slds-p-left_small slds-p-right_small slds-p-bottom_small container">
        <lightning-radio-group
          data-id="date-filter"
          label=""
          name="Date Filter"
          onchange={onChangeDateFilter}
          options={dateFilterOptions}
          type="button"
          value={selectedDateFilterOption}
        ></lightning-radio-group>
      </div>
      <div class="slds-p-left_small slds-p-right_small slds-p-bottom_x-small">
        <p data-id="retention-subtitle" class="slds-text-body_small slds-text-color_weak">{retentionSubtitle}</p>
      </div>
      <div class="slds-p-left_small slds-p-right_small">
        <div class="slds-box slds-p-around_none">
          <table data-id="metrics-table" class="slds-table slds-no-row-hover slds-table_bordered">
            <thead>
              <tr class="slds-line-height_reset datatable-header">
                <th scope="col">
                  <div class="slds-truncate" title="SObject Type">SObject Type</div>
                </th>
                <th scope="col">
                  <div class="slds-truncate" title="Purge Action">Purge Action</div>
                </th>
                <th scope="col">
                  <div class="slds-truncate" title="Count">Count</div>
                </th>
              </tr>
            </thead>
            <tbody>
              <template for:each={metricsRecords} for:item="metric">
                <tr key={metric.sobjectApiName} class="slds-hint-parent">
                  <td data-label={metric.sobjectApiName} rowspan={metric.rowSpan}>
                    <div data-id={metric.sobjectApiName} class="slds-truncate slds-text-title_bold" title={metric.sobjectApiName}>{metric.sobjectApiName}</div>
                    <template lwc:if={metric.pluginCaption}>
                      <p data-id="plugin-caption" class="slds-text-body_small slds-text-color_weak slds-p-top_xx-small">{metric.pluginCaption}</p>
                    </template>
                  </td>
                </tr>
                <template for:each={metric.summary} for:item="item">
                  <tr key={item.key}>
                    <td>
                      <div data-label={item.key} class="slds-truncate" title={item.purgeAction}>{item.purgeAction}</div>
                    </td>
                    <td>
                      <div data-id={item.key} class="slds-truncate" title="Count">{item.count}</div>
                    </td>
                  </tr>
                </template>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="slds-p-around_small slds-is-relative">
      <div class="slds-p-left_small slds-p-right_small container">
        <lightning-input
          class="slds-p-right_small"
          checked={autoRefreshEnabled}
          data-id="auto-refresh-toggle"
          label="Auto-refresh"
          message-toggle-active=""
          message-toggle-inactive=""
          onchange={onToggleAutoRefresh}
          type="toggle"
        ></lightning-input>
        <lightning-combobox
          class="slds-p-right_small auto-refresh-interval"
          data-id="auto-refresh-interval"
          disabled={autoRefreshDisabled}
          label="Refresh interval"
          onchange={onChangeAutoRefreshInterval}
          options={autoRefreshIntervalOptions}
          value={autoRefreshIntervalValue}
          variant="label-hidden"
        ></lightning-combobox>
        <lightning-button-icon
          alternative-text="refresh"
          data-id="refresh-button"
          icon-name="utility:refresh"
          onclick={refreshPurgeBatchRecords}
          title="refresh"
        ></lightning-button-icon>

        <lightning-button
          class="slds-m-left_x-small"
          data-id="run-purge-button"
          disabled={disableRunPurgeButton}
          label="Run Purge Batch"
          onclick={runBatchPurge}
          title="Run Purge Batch"
          variant="destructive"
        ></lightning-button>
      </div>
      <div class="slds-p-around_small">
        <div class="slds-box slds-p-around_none slds-scrollable datatable-container">
          <lightning-datatable
            columns={purgeBatchColumns}
            data-id="purge-batch-jobs"
            data={purgeBatchJobRecords}
            hide-checkbox-column
            is-loading={showLoadingSpinner}
            key-field="id"
            show-row-number-column
          ></lightning-datatable>
        </div>
      </div>
    </div>
  </lightning-card>
</template>
