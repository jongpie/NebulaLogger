<template>
  <c-logger-page-section>
    <span slot="title">Message Details</span>
    <div slot="content" class="slds-grid slds-wrap slds-gutters_x-small">
      <lightning-record-view-form record-id={recordId} object-api-name="LogEntry__c">
        <div class="slds-col slds-size_1-of-1 slds-grid slds-gutters_x-small slds-wrap slds-p-bottom_x-small">
          <div class="slds-col slds-size_1-of-2">
            <lightning-output-field field-name="MessageMasked__c"></lightning-output-field>
          </div>
          <div class="slds-col slds-size_1-of-2">
            <lightning-output-field field-name="MessageTruncated__c"></lightning-output-field>
          </div>
        </div>
      </lightning-record-view-form>
      <div class="slds-col slds-size_1-of-1 slds-p-bottom_x-small">
        <c-log-entry-field-viewer record-id={recordId} field-api-name="Message__c" config={messageViewerConfig}>
          <span slot="title">Message</span>
        </c-log-entry-field-viewer>
      </div>
      <div class="slds-col slds-size_1-of-1">
        <c-log-entry-field-viewer record-id={recordId} field-api-name="StackTrace__c" config={stackTraceViewerConfig}>
          <span slot="title">Stack Trace</span>
        </c-log-entry-field-viewer>
      </div>
    </div>
  </c-logger-page-section>
</template>
