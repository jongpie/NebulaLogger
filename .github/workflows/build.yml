# Pipeline for Nebula Logger
name: Build

env:
  SF_DISABLE_AUTOUPDATE: true
  SF_LOG_LEVEL: debug
  SF_SKIP_NEW_VERSION_CHECK: true

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/actions/**
      - config/scratch-orgs/**
      - nebula-logger/**
      - sfdx-project.json
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/**
      - .github/actions/**
      - config/scratch-orgs/**
      - nebula-logger/**
      - sfdx-project.json

jobs:
  code-quality-tests:
    name: 'Run Code Quality Tests'
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6

      - name: 'Check for changes in core directory'
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            core:
              - './nebula-logger/core/**'

      - name: 'Setup npm'
        uses: ./.github/actions/setup-npm

      - name: 'Authorize Dev Hub'
        if: ${{ (github.event_name == 'pull_request') && (github.event.pull_request.draft == false) && (steps.changes.outputs.core == 'true') }}
        uses: ./.github/actions/authorize-dev-hub
        with:
          auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
          bot-username: ${{ secrets.DEV_HUB_BOT_USERNAME }}
          consumer-key: ${{ secrets.DEV_HUB_CONSUMER_KEY }}
          jwt-server-key: ${{ secrets.DEV_HUB_JWT_SERVER_KEY }}

      - name: 'Verify package version number is updated'
        if: ${{ (github.event_name == 'pull_request') && (github.event.pull_request.draft == false) && (steps.changes.outputs.core == 'true') }}
        run: npm run package:version:number:verify

      - name: 'Verify LWC with Code Analyzer'
        run: npm run scan:lwc

      - name: 'Verify Apex with Code Analyzer'
        run: npm run scan:apex

      # TODO - uncomment - temporarily commented-out due to an issue with apexdocs in the pipeline
      # - name: 'Verify docs are updated'
      #   run: npm run docs:verify

      - name: 'Verify formatting with Prettier'
        run: npm run prettier:verify

  lwc-jest-tests:
    name: 'Run LWC Jest Tests'
    needs: [code-quality-tests]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6

      - name: 'Setup npm'
        uses: ./.github/actions/setup-npm

      - name: 'Run LWC Tests'
        run: npm run test:lwc

      - name: 'Upload LWC code coverage to Codecov.io'
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: true
          flags: LWC
          token: ${{ secrets.CODECOV_TOKEN }}

  # Each matrix row spawns an independent run of the scratch-org-tests reusable workflow,
  # all in parallel. To add a new scratch org, add a new row - no other edits needed.
  #
  # The Base row is the canonical environment for Codecov code coverage reporting:
  # only the `LoggerCore` test suite's results are uploaded, which validates that the core
  # metadata alone (what teams deploy when they cannot install one of Nebula Logger's 2GP
  # packages) has sufficient coverage to deploy to a prod org. Orgs without optional
  # Salesforce features (Experience Cloud, OmniStudio, Platform Cache, etc.) tend to report
  # lower coverage, so the base scratch org acts as the most conservative baseline.
  scratch-org-tests:
    name: 'Run ${{ matrix.label }} Scratch Org Tests'
    needs: [code-quality-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 'Advanced'
            environment: 'Advanced Scratch Org'
            definition-file: ./config/scratch-orgs/advanced-scratch-def.json
            install-omnistudio: true
            extra-metadata-directory: ./config/scratch-orgs/

          - label: 'Base'
            environment: 'Base Scratch Org'
            definition-file: ./config/scratch-orgs/base-scratch-def.json
            run-core-test-suite: true
            upload-apex-coverage: true

          - label: 'Event Monitoring'
            environment: 'Event Monitoring Scratch Org'
            definition-file: ./config/scratch-orgs/event-monitoring-scratch-def.json

          - label: 'Experience Cloud'
            environment: 'Experience Cloud Scratch Org'
            definition-file: ./config/scratch-orgs/experience-cloud-scratch-def.json
            extra-metadata-directory: ./config/scratch-orgs/experience-cloud/

          - label: 'OmniStudio'
            environment: 'OmniStudio Scratch Org'
            definition-file: ./config/scratch-orgs/omnistudio-scratch-def.json
            install-omnistudio: true
            extra-metadata-directory: ./config/scratch-orgs/omnistudio/

          - label: 'Platform Cache'
            environment: 'Platform Cache Scratch Org'
            definition-file: ./config/scratch-orgs/platform-cache-scratch-def.json

          - label: 'State & Country Picklists'
            environment: 'State & Country Picklists Scratch Org'
            definition-file: ./config/scratch-orgs/state-and-country-picklists-scratch-def.json
    uses: ./.github/workflows/test-scratch-org.yml
    with:
      environment: ${{ matrix.environment }}
      definition-file: ${{ matrix.definition-file }}
      install-omnistudio: ${{ matrix.install-omnistudio || false }}
      extra-metadata-directory: ${{ matrix.extra-metadata-directory || '' }}
      run-core-test-suite: ${{ matrix.run-core-test-suite || false }}
      upload-apex-coverage: ${{ matrix.upload-apex-coverage || false }}
    secrets: inherit

  create-managed-package-beta:
    if: ${{ github.ref != 'refs/heads/main' }}

    environment: 'Base Scratch Org'
    name: 'Create Managed Package Beta'
    needs: [code-quality-tests, lwc-jest-tests, scratch-org-tests]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: 'Setup npm'
        uses: ./.github/actions/setup-npm

      - name: 'Authorize Dev Hub'
        uses: ./.github/actions/authorize-dev-hub
        with:
          auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
          bot-username: ${{ secrets.DEV_HUB_BOT_USERNAME }}
          consumer-key: ${{ secrets.DEV_HUB_CONSUMER_KEY }}
          jwt-server-key: ${{ secrets.DEV_HUB_JWT_SERVER_KEY }}

      - name: 'Create Beta Managed Package Version'
        run: npm run package:version:create:managed

  create-unlocked-package-release-candidate:
    if: ${{ github.ref != 'refs/heads/main' }}

    environment: 'Base Scratch Org'
    name: 'Create Core Package Release Candidate'
    needs: [create-managed-package-beta]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: 'Setup npm'
        uses: ./.github/actions/setup-npm

      - name: 'Authorize Dev Hub'
        uses: ./.github/actions/authorize-dev-hub
        with:
          auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
          bot-username: ${{ secrets.DEV_HUB_BOT_USERNAME }}
          consumer-key: ${{ secrets.DEV_HUB_CONSUMER_KEY }}
          jwt-server-key: ${{ secrets.DEV_HUB_JWT_SERVER_KEY }}

      - name: 'Create Scratch Org'
        run: npx sf org create scratch --no-namespace --no-track-source --alias base_package_subscriber_scratch_org --duration-days 1 --definition-file ./config/scratch-orgs/base-scratch-def.json --wait 20 --set-default --json

      - name: 'Set EMAIL_SERVICE_RUN_AS_USER for the scratch org'
        run: npm run env:set:email-service-run-as-user

      - name: 'Create & Install Package Version'
        run: npx pwsh ./scripts/build/create-and-install-package-version.ps1 -targetpackagealias '"Nebula Logger - Core"' -targetreadme ./README.md  -targetusername base_package_subscriber_scratch_org

      # The metadata API / sf CLI support deploying metadata using package manifest XML files - see docs for more details:
      #     Docs: https://developer.salesforce.com/docs/atlas.en-us.api_meta.meta/api_meta/manifest_samples.htm
      # _Some_ people (@jongpie) dislike using manifest files, and find them to be unnecessary for most teams/projects/implementations.
      #
      #
      #
      # But sometimes.................
      # ...........
      # .......just............
      #.........occassionally.........
      # .........
      #..................ooooooooooooooooccassionally.........
      # ..........................
      # ....... every.......
      # ...................once in a while.....
      # ...........
      # .........
      # .....somewhere.....
      # .......................
      # ...........
      # .............
      # ...................
      # ...........there are a few brave individuals....
      # ...............
      # .....tasked with the impossible task....
      # .........
      # ................
      # .........
      # .........
      # ... Deploy a crazy amount of stuff to production..........
      # ...................................
      # .......all at once.......
      # ...........................
      # ....................
      # ...........WITHOUT............................................
      # ................A.....................
      # ..................PROPER...................
      # .......................PIPELINE!!!!!!!........?!
      # ...
      # ...
      # ...
      # 💀💀💀💀😱😱😱😭😭😭😭
      # ...
      # ...
      # ...
      # ...
      # ...
      # ...
      # So, let's auto-generate an up-to-date package manifest XML file and store it in the repo,
      # juuuuuuust in case another fellow Salesforce nerd ever needs them....
      # ..............
      # ...................
      # ...............
      # .....
      # .........and may the force......
      # ........................
      # .......be with you..........
      # ....................
      # .....
      # ...

      - name: 'Configure git for pipeline commits'
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

      - name: 'Commit new package version'
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          npx sf bummer:package:aliases:sort
          npx prettier --write ./sfdx-project.json
          git add ./sfdx-project.json
          git commit -m "Created new core unlocked package version"
          git push

      # TODO Add some extra steps to try to deploy to the scratch org, using the manifest file, to ensure it works
      - name: 'Commit updates to core package manifest file'
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          npm run package:manifest:generate:core || true
          git add ./nebula-logger/core.package.xml || true
          git commit -m "Generated updated package.xml manifest file for core unlocked package version" || true

      - name: 'Push pipeline commits'
        if: ${{ github.event_name == 'pull_request' }}
        run: git push

  promote-package-versions:
    if: ${{ github.ref == 'refs/heads/main' }}

    name: 'Promote Package Versions'
    needs: [code-quality-tests, lwc-jest-tests, scratch-org-tests]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v6

      - name: 'Setup npm'
        uses: ./.github/actions/setup-npm

      - name: 'Authorize Dev Hub'
        uses: ./.github/actions/authorize-dev-hub
        with:
          auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
          bot-username: ${{ secrets.DEV_HUB_BOT_USERNAME }}
          consumer-key: ${{ secrets.DEV_HUB_CONSUMER_KEY }}
          jwt-server-key: ${{ secrets.DEV_HUB_JWT_SERVER_KEY }}

      - name: 'Promote package versions'
        run: npx pwsh ./scripts/build/promote-readme-packages.ps1
