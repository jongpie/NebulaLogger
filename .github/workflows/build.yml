# Pipeline for Nebula Logger
name: Build

env:
  SF_DISABLE_AUTOUPDATE: true
  SF_LOG_LEVEL: debug
  SF_SKIP_NEW_VERSION_CHECK: true

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/actions/**
      - config/scratch-orgs/**
      - nebula-logger/**
      - sfdx-project.json
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/**
      - .github/actions/**
      - config/scratch-orgs/**
      - nebula-logger/**
      - sfdx-project.json

jobs:
  code-quality-tests:
    name: 'Run Code Quality Tests'
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4

      - name: 'Restore node_modules cache'
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ env.cache-name }}-
            npm-

      - name: 'Install npm dependencies'
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: 'Check for changes in core directory'
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            core:
              - './nebula-logger/core/**'

      - name: 'Authorize Dev Hub'
        if: ${{ (github.event_name == 'pull_request') && (github.event.pull_request.draft == false) && (steps.changes.outputs.core == 'true') }}
        uses: ./.github/actions/authorize-dev-hub
        with:
          dev-hub-auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
          dev-hub-bot-username: ${{ secrets.DEV_HUB_BOT_USERNAME }}
          dev-hub-consumer-key: ${{ secrets.DEV_HUB_CONSUMER_KEY }}
          dev-hub-jwt-server-key: ${{ secrets.DEV_HUB_JWT_SERVER_KEY }}

      - name: 'Verify package version number is updated'
        if: ${{ (github.event_name == 'pull_request') && (github.event.pull_request.draft == false) && (steps.changes.outputs.core == 'true') }}
        run: npm run package:version:number:verify

      - name: 'Verify LWC with Code Analyzer'
        run: npm run scan:lwc

      - name: 'Verify Apex with Code Analyzer'
        run: |
          npm run scan:apex

      # TODO - uncomment - temporarily commented-out due to an issue with apexdocs in the pipeline
      # - name: 'Verify docs are updated'
      #   run: npm run docs:verify

      - name: 'Verify formatting with Prettier'
        run: npm run prettier:verify

  lwc-jest-tests:
    name: 'Run LWC Jest Tests'
    needs: [code-quality-tests]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4

      - name: 'Restore node_modules cache'
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ env.cache-name }}-
            npm-

      - name: 'Install npm dependencies'
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: 'Run LWC Tests'
        run: npm run test:lwc

      - name: 'Upload LWC code coverage to Codecov.io'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          flags: LWC
          token: ${{ secrets.CODECOV_TOKEN }}

  scratch-org-tests:
    name: 'Run ${{ matrix.config.display-name }} Scratch Org Tests'
    needs: [code-quality-tests]
    runs-on: ubuntu-22.04
    environment: ${{ matrix.config.environment }}
    # The Dev Hub allows a maximum of 3 active scratch orgs at a time, so cap parallelism here.
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        config:
          - name: advanced
            display-name: 'Advanced'
            environment: 'Advanced Scratch Org'
            scratch-def-file: ./config/scratch-orgs/advanced-scratch-def.json
            install-omnistudio-package: 'true'
            extra-deploy-source-dir: ./config/scratch-orgs/

          - name: base
            display-name: 'Base'
            environment: 'Base Scratch Org'
            scratch-def-file: ./config/scratch-orgs/base-scratch-def.json
            run-core-test-suite: 'true'
            upload-codecov: 'true'

          - name: event-monitoring
            display-name: 'Event Monitoring'
            environment: 'Event Monitoring Scratch Org'
            scratch-def-file: ./config/scratch-orgs/event-monitoring-scratch-def.json

          - name: experience-cloud
            display-name: 'Experience Cloud'
            environment: 'Experience Cloud Scratch Org'
            scratch-def-file: ./config/scratch-orgs/experience-cloud-scratch-def.json
            extra-deploy-source-dir: ./config/scratch-orgs/experience-cloud/

          - name: omnistudio
            display-name: 'OmniStudio'
            environment: 'OmniStudio Scratch Org'
            scratch-def-file: ./config/scratch-orgs/omnistudio-scratch-def.json
            install-omnistudio-package: 'true'
            extra-deploy-source-dir: ./config/scratch-orgs/omnistudio/

          - name: platform-cache
            display-name: 'Platform Cache'
            environment: 'Platform Cache Scratch Org'
            scratch-def-file: ./config/scratch-orgs/platform-cache-scratch-def.json
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4

      - name: 'Restore node_modules cache'
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ env.cache-name }}-
            npm-

      - name: 'Install npm dependencies'
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: 'Authorize Dev Hub'
        uses: ./.github/actions/authorize-dev-hub
        with:
          dev-hub-auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
          dev-hub-bot-username: ${{ secrets.DEV_HUB_BOT_USERNAME }}
          dev-hub-consumer-key: ${{ secrets.DEV_HUB_CONSUMER_KEY }}
          dev-hub-jwt-server-key: ${{ secrets.DEV_HUB_JWT_SERVER_KEY }}

      - name: 'Run scratch org tests'
        uses: ./.github/actions/run-scratch-org-tests
        with:
          scratch-def-file: ${{ matrix.config.scratch-def-file }}
          install-omnistudio-package: ${{ matrix.config.install-omnistudio-package || 'false' }}
          extra-deploy-source-dir: ${{ matrix.config.extra-deploy-source-dir || '' }}
          run-core-test-suite: ${{ matrix.config.run-core-test-suite || 'false' }}

      # This is the only scratch org that's used for uploading code coverage. See the long-form rationale
      # in git history (commit that introduced this matrix) — the short version: the base scratch org runs
      # only the LoggerCore test suite to validate that teams who deploy the core metadata directly
      # (instead of installing a 2GP package) get sufficient code coverage.
      - name: 'Upload Apex test code coverage to Codecov.io'
        if: ${{ matrix.config.upload-codecov == 'true' }}
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          flags: Apex
          token: ${{ secrets.CODECOV_TOKEN }}

  create-managed-package-beta:
    if: ${{ github.ref != 'refs/heads/main' }}

    environment: 'Base Scratch Org'
    name: 'Create Managed Package Beta'
    needs: [code-quality-tests, lwc-jest-tests, scratch-org-tests]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: 'Restore node_modules cache'
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ env.cache-name }}-
            npm-

      - name: 'Install npm dependencies'
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: 'Authorize Dev Hub'
        uses: ./.github/actions/authorize-dev-hub
        with:
          dev-hub-auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
          dev-hub-bot-username: ${{ secrets.DEV_HUB_BOT_USERNAME }}
          dev-hub-consumer-key: ${{ secrets.DEV_HUB_CONSUMER_KEY }}
          dev-hub-jwt-server-key: ${{ secrets.DEV_HUB_JWT_SERVER_KEY }}

      - name: 'Create Beta Managed Package Version'
        run: npm run package:version:create:managed

  create-unlocked-package-release-candidate:
    if: ${{ github.ref != 'refs/heads/main' }}

    environment: 'Base Scratch Org'
    name: 'Create Core Package Release Candidate'
    needs: [create-managed-package-beta]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: 'Restore node_modules cache'
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ env.cache-name }}-
            npm-

      - name: 'Install npm dependencies'
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: 'Authorize Dev Hub'
        uses: ./.github/actions/authorize-dev-hub
        with:
          dev-hub-auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
          dev-hub-bot-username: ${{ secrets.DEV_HUB_BOT_USERNAME }}
          dev-hub-consumer-key: ${{ secrets.DEV_HUB_CONSUMER_KEY }}
          dev-hub-jwt-server-key: ${{ secrets.DEV_HUB_JWT_SERVER_KEY }}

      - name: 'Create Scratch Org'
        run: npx sf org create scratch --no-namespace --no-track-source --alias base_package_subscriber_scratch_org --duration-days 1 --definition-file ./config/scratch-orgs/base-scratch-def.json --wait 20 --set-default --json

      - name: 'Create & Install Package Version'
        run: npx pwsh ./scripts/build/create-and-install-package-version.ps1 -targetpackagealias '"Nebula Logger - Core"' -targetreadme ./README.md  -targetusername base_package_subscriber_scratch_org

      - name: 'Configure git for pipeline commits'
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

      - name: 'Commit new package version'
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          # npm run sf:plugins:link:bummer
          echo y | npx sf plugins install @jongpie/sfdx-bummer-plugin --force
          npx sf bummer:package:aliases:sort
          npx prettier --write ./sfdx-project.json
          git add ./sfdx-project.json
          git commit -m "Created new core unlocked package version"
          git push

      - name: 'Commit updates to core package manifest file'
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          npm run package:manifest:generate:core || true
          git add ./nebula-logger/core.package.xml || true
          git commit -m "Generated updated package.xml manifest file for core unlocked package version" || true

      - name: 'Push pipeline commits'
        if: ${{ github.event_name == 'pull_request' }}
        run: git push

  promote-package-versions:
    if: ${{ github.ref == 'refs/heads/main' }}

    name: 'Promote Package Versions'
    needs: [code-quality-tests, lwc-jest-tests, scratch-org-tests]
    runs-on: ubuntu-22.04
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4

      - name: 'Restore node_modules cache'
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ env.cache-name }}-
            npm-

      - name: 'Install npm dependencies'
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: 'Authorize Dev Hub'
        uses: ./.github/actions/authorize-dev-hub
        with:
          dev-hub-auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
          dev-hub-bot-username: ${{ secrets.DEV_HUB_BOT_USERNAME }}
          dev-hub-consumer-key: ${{ secrets.DEV_HUB_CONSUMER_KEY }}
          dev-hub-jwt-server-key: ${{ secrets.DEV_HUB_JWT_SERVER_KEY }}

      - name: 'Promote package versions'
        run: npx pwsh ./scripts/build/promote-readme-packages.ps1
