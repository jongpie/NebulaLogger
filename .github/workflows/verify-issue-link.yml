# Verifies that every pull request links an issue (e.g. "Fixes #123" or "Closes #123")
# in the PR description. This enforces the "issue first, PR second" policy.
#
# PRs authored by the repo owner are exempt (release automation, maintainer chores).
name: Verify Issue Link

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  verify-linked-issue:
    name: Verify PR links an accepted issue
    runs-on: ubuntu-22.04
    if: github.event.pull_request.user.login != 'jongpie'
    steps:
      - name: Check pull request body for issue reference
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const pattern = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\d+/i;
            if (!pattern.test(body)) {
              core.setFailed(
                'This pull request does not link an issue. ' +
                'Please add "Fixes #123" (or "Closes #123" / "Resolves #123") to the PR description, ' +
                'and make sure the referenced issue is labeled `accepted`. ' +
                'See CONTRIBUTING.md for details.'
              );
            } else {
              core.info('PR description links an issue. ✓');
            }
